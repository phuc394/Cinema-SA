syntax = "proto3";

package cinema.auth.v1;

service AuthService {
  rpc Register(RegisterRequest) returns (AuthUserResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetUser(GetUserRequest) returns (AuthUserResponse);
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  int64 expires_in_seconds = 2;
  AuthUser user = 3;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message AuthUserResponse {
  AuthUser user = 1;
}

message AuthUser {
  string id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  int64 created_at_epoch = 5;
}
