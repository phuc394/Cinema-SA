syntax = "proto3";

package cinema.catalog.v1;

service CinemaService {
  rpc ListMovies(ListMoviesRequest) returns (ListMoviesResponse);
  rpc GetMovie(GetMovieRequest) returns (MovieResponse);
  rpc ListShowtimes(ListShowtimesRequest) returns (ListShowtimesResponse);
  rpc GetSeatMap(GetSeatMapRequest) returns (GetSeatMapResponse);
}

message ListMoviesRequest {
  bool include_upcoming = 1;
}

message ListMoviesResponse {
  repeated Movie movies = 1;
}

message GetMovieRequest {
  string movie_id = 1;
}

message MovieResponse {
  Movie movie = 1;
}

message ListShowtimesRequest {
  string movie_id = 1;
  string date_iso = 2;
}

message ListShowtimesResponse {
  repeated Showtime showtimes = 1;
}

message GetSeatMapRequest {
  string showtime_id = 1;
}

message GetSeatMapResponse {
  repeated Seat seats = 1;
}

message Movie {
  string id = 1;
  string title = 2;
  string description = 3;
  int32 duration_minutes = 4;
  string rating = 5;
  bool now_showing = 6;
}

message Showtime {
  string id = 1;
  string movie_id = 2;
  string room = 3;
  string start_time_iso = 4;
  string end_time_iso = 5;
}

message Seat {
  string id = 1;
  string code = 2;
  bool is_available = 3;
  string type = 4;
}
